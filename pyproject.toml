[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "server-workspace"
version = "0.1.0"
description = "Unified workspace for the server control plane and active platform services"
readme = "README.md"
requires-python = ">=3.11,<3.12"
dependencies = [
    "agent-orchestrator-api[dev]",
    "agent-orchestrator-router[dev]",
    "agent-orchestrator-worker-client[dev]",
    "mcp-registry[dev]",
    "model-runtime[dev]",
    "engineering-core[dev]",
    "ai-stack",
    "structure[dev]",
    "ai-gateway-service[dev]",
    "larrak-audio[dev]",
    "martymedia[dev]",
]

[tool.hatch.build.targets.wheel]
packages = []

[tool.uv]
package = false
default-groups = []

[tool.uv.sources]
agent-orchestrator-api = { workspace = true }
agent-orchestrator-router = { workspace = true }
agent-orchestrator-worker-client = { workspace = true }
mcp-registry = { workspace = true }
model-runtime = { workspace = true }
engineering-core = { workspace = true }
ai-stack = { workspace = true }
structure = { workspace = true }
ai-gateway-service = { workspace = true }
larrak-audio = { workspace = true }
martymedia = { workspace = true }

[tool.uv.workspace]
members = [
    "services/api-service",
    "services/router-service",
    "services/worker-service",
    "services/mcp-registry-service",
    "services/model-runtime",
    "services/engineering-core",
    "services/ai-shared-service",
    "services/structure-service",
    "services/ai-gateway-service",
    "services/audio-service",
    "services/media-service",
]
