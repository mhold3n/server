name: CI
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11"]
        node: ["20"]
    steps:
      - uses: actions/checkout@v4

      # Python services
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --upgrade pip
      
      # Install dependencies for each service
      - name: Install API dependencies
        run: |
          cd services/api
          pip install -e .
          pip install -e ".[dev]"
      
      - name: Install Router dependencies
        run: |
          cd services/router
          pip install -e .
          pip install -e ".[dev]"
      
      - name: Install Worker Client dependencies
        run: |
          cd services/worker_client
          pip install -e .
          pip install -e ".[dev]"

      - name: Install Structure dependencies
        run: |
          cd services/structure
          pip install -e .
          pip install -e ".[dev]"
      
      - name: Install MCP server dependencies
        run: |
          cd mcp/servers/filesystem-mcp
          pip install -e .
          pip install -e ".[dev]"
          cd ../secrets-mcp
          pip install -e .
          pip install -e ".[dev]"
          cd ../vector-db-mcp
          pip install -e .
          pip install -e ".[dev]"

      - name: Install MBMH dependencies
        run: |
          cd mbmh
          pip install -e .
          pip install -e ".[dev]"

      - name: Install WrkHrs dependencies
        run: |
          cd services/wrkhrs
          pip install -e .
          pip install -e ".[dev]"

      # Run linting and type checking
      - name: Run linting
        run: |
          ruff check services/ mcp/servers/
          black --check services/ mcp/servers/
          (cd mbmh && python -m ruff check src/ scripts/ tests/)
          (cd services/wrkhrs && ruff check \
            services/gateway/app.py \
            tests/_module_loader.py \
            tests/test_gateway.py \
            scripts/test-llm-backends.py)
      
      - name: Run type checking
        run: |
          # One invocation per package: each Hatch layout uses a top-level `src/` package;
          # passing multiple `*/src` paths in one command triggers "Duplicate module named src".
          (cd services/api && mypy --strict src)
          (cd services/router && mypy --strict src)
          (cd services/worker_client && mypy --strict src)
          (cd services/structure && mypy --strict . || true)
          (cd mcp/servers/filesystem-mcp && mypy --strict src)
          (cd mcp/servers/secrets-mcp && mypy --strict src)
          (cd mcp/servers/vector-db-mcp && mypy --strict src)
      
      # Run tests (PYTHONPATH: each wheel uses a top-level `src/` package; multiple editables
      # would otherwise shadow each other on sys.path). Skip packages with no tests/ directory.
      - name: Start live-stack dependencies (required)
        run: |
          docker compose -f docker-compose.ci.yml up -d --build

          wait_http() {
            local name="$1"
            local url="$2"
            local max_attempts="${3:-60}"
            for i in $(seq 1 "$max_attempts"); do
              if curl -fsS "$url" >/dev/null; then
                echo "OK: $name ($url)"
                return 0
              fi
              sleep 2
            done
            echo "FAIL: $name never became ready ($url)" >&2
            docker compose -f docker-compose.ci.yml ps
            docker compose -f docker-compose.ci.yml logs --no-color --tail=80 tempo || true
            return 1
          }

          # Use 127.0.0.1 so probes match published ports on Linux runners (avoid IPv6 localhost quirks).
          WAIT_HOST="${WAIT_HOST:-127.0.0.1}"
          API_PORT="${API_PORT:-8080}"
          MLFLOW_PORT="${MLFLOW_PORT:-5000}"
          TEMPO_PORT="${TEMPO_PORT:-3200}"
          MCP_REGISTRY_PORT="${MCP_REGISTRY_PORT:-8001}"

          wait_http api "http://${WAIT_HOST}:${API_PORT}/health" 90
          wait_http mlflow "http://${WAIT_HOST}:${MLFLOW_PORT}/health" 90
          # Tempo returns 503 on /ready until fully up; /ready may take longer under load than other services.
          wait_http tempo "http://${WAIT_HOST}:${TEMPO_PORT}/ready" 120
          wait_http mcp-registry "http://${WAIT_HOST}:${MCP_REGISTRY_PORT}/health" 90

      - name: Run tests
        env:
          RUN_LIVE_STACK_TESTS: "1"
          API_BASE_URL: "http://127.0.0.1:8080"
          MLFLOW_BASE_URL: "http://127.0.0.1:5000"
          TEMPO_BASE_URL: "http://127.0.0.1:3200"
          MCP_REGISTRY_BASE_URL: "http://127.0.0.1:8001"
        run: |
          run_pytest_cov() { local d="$1"; if [ -d "$d/tests" ]; then (cd "$d" && PYTHONPATH="$(pwd)" pytest tests/ -v --cov=src --cov-report=xml); else echo "Skip pytest: no $d/tests"; fi; }
          run_pytest_cov_any() { local d="$1"; if [ -d "$d/tests" ]; then (cd "$d" && PYTHONPATH="$(pwd)" pytest tests/ -v --cov=. --cov-report=xml); else echo "Skip pytest: no $d/tests"; fi; }
          run_pytest_plain() { local d="$1"; if [ -d "$d/tests" ]; then (cd "$d" && PYTHONPATH="$(pwd)" pytest tests/ -v); else echo "Skip pytest: no $d/tests"; fi; }
          run_pytest_cov services/api
          run_pytest_cov services/router
          run_pytest_cov services/worker_client
          run_pytest_cov_any services/structure
          run_pytest_cov mcp/servers/filesystem-mcp
          run_pytest_cov mcp/servers/secrets-mcp
          run_pytest_cov mcp/servers/vector-db-mcp
          run_pytest_plain mbmh
          (cd services/wrkhrs && PYTHONPATH="$(pwd)" WRKHRS_DISABLE_MODEL_LOAD=1 pytest tests/ -v --cov=wrkhrs --cov-report=xml --cov-fail-under=90)

      - name: Stop live-stack dependencies
        if: always()
        run: |
          docker compose -f docker-compose.ci.yml down -v

      # Node.js for GitHub MCP server
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install GitHub MCP dependencies
        if: ${{ hashFiles('mcp/servers/github-mcp/package*.json') != '' }}
        run: |
          cd mcp/servers/github-mcp
          npm ci
      - name: Build GitHub MCP server
        if: ${{ hashFiles('mcp/servers/github-mcp/package*.json') != '' }}
        run: |
          cd mcp/servers/github-mcp
          npm run build
      - name: Run GitHub MCP tests
        if: ${{ hashFiles('mcp/servers/github-mcp/package*.json') != '' }}
        run: |
          cd mcp/servers/github-mcp
          npm test

      - name: Agent platform (TypeScript orchestrator)
        run: |
          cd services/agent-platform
          npm ci
          npm run build -w @server/open-multi-agent
          npm run build -w @server/agent-platform-server
          LLM_BACKEND=mock npm run test -w @server/agent-platform-server

      # Build Docker images
      - name: Build Docker images
        run: |
          docker build -t agent-orchestrator-api ./services/api
          docker build -t agent-orchestrator-router ./services/router
          docker build -t agent-orchestrator-worker-client ./services/worker_client
          if [[ -f "mcp/servers/filesystem-mcp/Dockerfile" ]]; then
            docker build -t mcp-filesystem ./mcp/servers/filesystem-mcp
          else
            echo "SKIP: mcp-filesystem docker build (Dockerfile missing)"
          fi
          if [[ -f "mcp/servers/secrets-mcp/Dockerfile" ]]; then
            docker build -t mcp-secrets ./mcp/servers/secrets-mcp
          else
            echo "SKIP: mcp-secrets docker build (Dockerfile missing)"
          fi
          if [[ -f "mcp/servers/vector-db-mcp/Dockerfile" ]]; then
            docker build -t mcp-vector-db ./mcp/servers/vector-db-mcp
          else
            echo "SKIP: mcp-vector-db docker build (Dockerfile missing)"
          fi
          if compgen -G "mcp/servers/github-mcp/package*.json" > /dev/null; then
            docker build -t mcp-github ./mcp/servers/github-mcp
          else
            echo "SKIP: mcp-github docker build (expected package*.json)"
          fi
          docker build -t wrkhrs-agent-platform ./services/agent-platform

      # Upload coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./services/api/coverage.xml,./services/router/coverage.xml,./services/worker_client/coverage.xml,./services/structure/coverage.xml,./services/wrkhrs/coverage.xml,./mcp/servers/filesystem-mcp/coverage.xml,./mcp/servers/secrets-mcp/coverage.xml,./mcp/servers/vector-db-mcp/coverage.xml
          fail_ci_if_error: false

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python, javascript
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
