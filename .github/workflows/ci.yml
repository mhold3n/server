name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11"]
        node: ["20"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --upgrade pip uv

      - name: Install Python workspaces (uv)
        run: uv sync --python ${{ matrix.python }}

      - name: Install MCP server dependencies
        run: |
          cd mcp-servers/mcp/servers/filesystem-mcp
          pip install -e .
          pip install -e ".[dev]"
          cd ../secrets-mcp
          pip install -e .
          pip install -e ".[dev]"
          cd ../vector-db-mcp
          pip install -e .
          pip install -e ".[dev]"

      - name: Run linting
        run: |
          source scripts/ci_python_lint_paths.sh
          ruff check $CI_PYTHON_LINT_PATHS
          black --check $CI_PYTHON_LINT_PATHS

      - name: Run type checking
        run: |
          (cd mcp-servers/mcp/servers/filesystem-mcp && mypy --strict src)
          (cd mcp-servers/mcp/servers/secrets-mcp && mypy --strict src)
          (cd mcp-servers/mcp/servers/vector-db-mcp && mypy --strict src)

      - name: Check AI runtime dependency tracking
        run: python scripts/check_ai_runtime_dependencies.py

      - name: Start live-stack dependencies (required)
        run: |
          docker compose --project-directory "$GITHUB_WORKSPACE" --env-file "$GITHUB_WORKSPACE/config/xlotyl-images.env" -f docker/compose-profiles/docker-compose.ci.yml pull -q api mcp-registry || true
          docker compose --project-directory "$GITHUB_WORKSPACE" --env-file "$GITHUB_WORKSPACE/config/xlotyl-images.env" -f docker/compose-profiles/docker-compose.ci.yml up -d

          wait_http() {
            local name="$1"
            local url="$2"
            local max_attempts="${3:-60}"
            for i in $(seq 1 "$max_attempts"); do
              if curl -fsS "$url" >/dev/null; then
                echo "OK: $name ($url)"
                return 0
              fi
              sleep 2
            done
            echo "FAIL: $name never became ready ($url)" >&2
            docker compose --project-directory "$GITHUB_WORKSPACE" --env-file "$GITHUB_WORKSPACE/config/xlotyl-images.env" -f docker/compose-profiles/docker-compose.ci.yml ps
            docker compose --project-directory "$GITHUB_WORKSPACE" --env-file "$GITHUB_WORKSPACE/config/xlotyl-images.env" -f docker/compose-profiles/docker-compose.ci.yml logs --no-color --tail=80 tempo || true
            return 1
          }

          WAIT_HOST="${WAIT_HOST:-127.0.0.1}"
          API_PORT="${API_PORT:-8080}"
          MLFLOW_PORT="${MLFLOW_PORT:-5000}"
          TEMPO_PORT="${TEMPO_PORT:-3200}"
          MCP_REGISTRY_PORT="${MCP_REGISTRY_PORT:-8001}"

          wait_http api "http://${WAIT_HOST}:${API_PORT}/health" 90
          wait_http mlflow "http://${WAIT_HOST}:${MLFLOW_PORT}/health" 90
          wait_http tempo "http://${WAIT_HOST}:${TEMPO_PORT}/ready" 120
          wait_http mcp-registry "http://${WAIT_HOST}:${MCP_REGISTRY_PORT}/health" 90

      - name: Run tests
        env:
          RUN_LIVE_STACK_TESTS: "1"
          API_BASE_URL: "http://127.0.0.1:8080"
          MLFLOW_BASE_URL: "http://127.0.0.1:5000"
          TEMPO_BASE_URL: "http://127.0.0.1:3200"
          MCP_REGISTRY_BASE_URL: "http://127.0.0.1:8001"
        run: |
          run_pytest_cov() { local d="$1"; if [ -d "$d/tests" ]; then (cd "$d" && PYTHONPATH="$(pwd)" pytest tests/ -v --cov=src --cov-report=xml --cov-fail-under=90); else echo "Skip pytest: no $d/tests"; fi; }
          run_pytest_pyproject_only() { local d="$1"; if [ -d "$d/tests" ]; then (cd "$d" && PYTHONPATH="$(pwd)" pytest tests/ -v); else echo "Skip pytest: no $d/tests"; fi; }
          run_pytest_cov mcp-servers/mcp/servers/filesystem-mcp
          run_pytest_pyproject_only mcp-servers/mcp/servers/secrets-mcp
          run_pytest_cov mcp-servers/mcp/servers/vector-db-mcp

      - name: Stop live-stack dependencies
        if: always()
        run: |
          docker compose --project-directory "$GITHUB_WORKSPACE" --env-file "$GITHUB_WORKSPACE/config/xlotyl-images.env" -f docker/compose-profiles/docker-compose.ci.yml down -v

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install GitHub MCP dependencies
        if: ${{ hashFiles('mcp-servers/mcp/servers/github-mcp/package*.json') != '' }}
        run: |
          cd mcp-servers/mcp/servers/github-mcp
          npm ci
      - name: Build GitHub MCP server
        if: ${{ hashFiles('mcp-servers/mcp/servers/github-mcp/package*.json') != '' }}
        run: |
          cd mcp-servers/mcp/servers/github-mcp
          npm run build
      - name: Run GitHub MCP tests
        if: ${{ hashFiles('mcp-servers/mcp/servers/github-mcp/package*.json') != '' }}
        run: |
          cd mcp-servers/mcp/servers/github-mcp
          npm test

      - name: Build Docker images (MCP + infra)
        run: |
          if [[ -f "mcp-servers/mcp/servers/filesystem-mcp/Dockerfile" ]]; then
            docker build -t mcp-filesystem ./mcp-servers/mcp/servers/filesystem-mcp
          else
            echo "SKIP: mcp-filesystem docker build (Dockerfile missing)"
          fi
          if [[ -f "mcp-servers/mcp/servers/secrets-mcp/Dockerfile" ]]; then
            docker build -t mcp-secrets ./mcp-servers/mcp/servers/secrets-mcp
          else
            echo "SKIP: mcp-secrets docker build (Dockerfile missing)"
          fi
          if [[ -f "mcp-servers/mcp/servers/vector-db-mcp/Dockerfile" ]]; then
            docker build -t mcp-vector-db ./mcp-servers/mcp/servers/vector-db-mcp
          else
            echo "SKIP: mcp-vector-db docker build (Dockerfile missing)"
          fi
          if compgen -G "mcp-servers/mcp/servers/github-mcp/package*.json" > /dev/null; then
            docker build -t mcp-github ./mcp-servers/mcp/servers/github-mcp
          else
            echo "SKIP: mcp-github docker build (expected package*.json)"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./mcp-servers/mcp/servers/filesystem-mcp/coverage.xml,./mcp-servers/mcp/servers/secrets-mcp/coverage.xml,./mcp-servers/mcp/servers/vector-db-mcp/coverage.xml
          fail_ci_if_error: false

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python, javascript
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
