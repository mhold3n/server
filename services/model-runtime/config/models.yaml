# Model role binding — v1 local Qwen stack (HF IDs). Paths optional for local_files_only loading.
# For agents: do not hard-code these IDs elsewhere; read this file via MODEL_RUNTIME_CONFIG_PATH.

models:
  general:
    role: orchestrator
    model_id: Qwen/Qwen3-4B
    backend: transformers
    max_input_tokens: 8192
    # Keep CPU inference responsive by default.
    max_output_tokens: 128
    local_model_path: null

  coding:
    role: coding_worker
    model_id: Qwen/Qwen2.5-Coder-7B-Instruct
    backend: transformers
    max_input_tokens: 8192
    max_output_tokens: 2048
    local_model_path: null

  multimodal:
    role: multimodal_extractor
    model_id: Qwen/Qwen2.5-VL-3B-Instruct
    backend: transformers
    max_input_tokens: 8192
    max_output_tokens: 1024
    local_model_path: null
