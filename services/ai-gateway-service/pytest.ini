[pytest]
testpaths = tests
python_files = test_*.py
norecursedirs = scripts
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --strict-config
    --disable-warnings
    --color=yes
    --durations=10
    --ignore=scripts
    --cov=services/gateway
    --cov=services/prompt_middleware
    --cov=services/rag
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=90
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    voice: marks tests that require voice analysis
    geometric: marks tests that use geometric transformations
    ai_integration: marks tests that integrate with AI models
    asyncio: async tests (pytest-asyncio)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
