# Local API key store
# Each key grants access to all agents. The agent is selected via the
# "model" field in the request body (like the OpenAI API).
#
# key:    The bearer token value used in Authorization headers.
# bundle: The default runtime bundle ID (can be overridden per-request).
# scopes: Optional list of allowed agent names. Empty = all agents allowed.

keys:
  - key: "sk-local-dev-001"
    bundle: "latest"
    scopes: []

  - key: "sk-local-dev-002"
    bundle: "latest"
    scopes: []
