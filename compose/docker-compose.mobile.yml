services:
  orchestrator:
    build:
      context: ..
      dockerfile: docker/surrogate/Dockerfile
    environment:
      - SURROGATE_ROLE=orchestrator
      - SURROGATE_PROFILE=${SURROGATE_PROFILE:-nominal}
      - SURROGATE_SEED=${SURROGATE_SEED:-mobile-offline-seed}
      - SURROGATE_BASE_LATENCY_MS=${SURROGATE_BASE_LATENCY_MS:-40}
      - SURROGATE_LATENCY_JITTER_MS=${SURROGATE_LATENCY_JITTER_MS:-30}
    depends_on: []

  rag-api:
    build:
      context: ..
      dockerfile: docker/surrogate/Dockerfile
    environment:
      - SURROGATE_ROLE=rag
      - SURROGATE_PROFILE=${SURROGATE_PROFILE:-nominal}
      - SURROGATE_SEED=${SURROGATE_SEED:-mobile-offline-seed}
      - SURROGATE_BASE_LATENCY_MS=${SURROGATE_BASE_LATENCY_MS:-40}
      - SURROGATE_LATENCY_JITTER_MS=${SURROGATE_LATENCY_JITTER_MS:-30}
    depends_on: []

  asr-api:
    build:
      context: ..
      dockerfile: docker/surrogate/Dockerfile
    environment:
      - SURROGATE_ROLE=asr
      - SURROGATE_PROFILE=${SURROGATE_PROFILE:-nominal}
      - SURROGATE_SEED=${SURROGATE_SEED:-mobile-offline-seed}
      - SURROGATE_BASE_LATENCY_MS=${SURROGATE_BASE_LATENCY_MS:-40}
      - SURROGATE_LATENCY_JITTER_MS=${SURROGATE_LATENCY_JITTER_MS:-30}

  mcp:
    build:
      context: ..
      dockerfile: docker/surrogate/Dockerfile
    environment:
      - SURROGATE_ROLE=mcp
      - SURROGATE_PROFILE=${SURROGATE_PROFILE:-nominal}
      - SURROGATE_SEED=${SURROGATE_SEED:-mobile-offline-seed}
      - SURROGATE_BASE_LATENCY_MS=${SURROGATE_BASE_LATENCY_MS:-40}
      - SURROGATE_LATENCY_JITTER_MS=${SURROGATE_LATENCY_JITTER_MS:-30}

  tool-registry:
    build:
      context: ..
      dockerfile: docker/surrogate/Dockerfile
    environment:
      - SURROGATE_ROLE=tool-registry
      - SURROGATE_PROFILE=${SURROGATE_PROFILE:-nominal}
      - SURROGATE_SEED=${SURROGATE_SEED:-mobile-offline-seed}
      - SURROGATE_BASE_LATENCY_MS=${SURROGATE_BASE_LATENCY_MS:-40}
      - SURROGATE_LATENCY_JITTER_MS=${SURROGATE_LATENCY_JITTER_MS:-30}

  llm-runner:
    image: busybox:latest
    command: ["sh", "-c", "echo 'LLM disabled in mobile surrogate profile'; sleep 3600"]
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 2s
      retries: 3
      start_period: 1s

  qdrant:
    image: busybox:latest
    command: ["sh", "-c", "echo 'Qdrant bypassed by rag surrogate'; sleep 3600"]
    ports: []
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 2s
      retries: 3
      start_period: 1s
