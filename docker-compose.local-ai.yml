version: "3.9"

services:
  # Add missing qdrant service
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage

  router:
    platform: linux/amd64

  api:
    platform: linux/amd64
    environment:
      - AI_STACK_URL=http://structure-gateway:8000

  wrkhrs-gateway:
    platform: linux/amd64
    environment:
      - LLM_BACKEND=mock
    volumes:
      - ./data/gateway_state:/state
      - ./logs:/logs

  wrkhrs-orchestrator:
    platform: linux/amd64
    environment:
      - LLM_BACKEND=mock
    volumes:
      - ./logs:/logs

  wrkhrs-rag:
    platform: linux/amd64
    depends_on:
      qdrant:
        condition: service_started
    environment:
      - HF_HOME=/models/hf-home
      - TRANSFORMERS_CACHE=/models/transformers
      - MODEL_CACHE_DIR=/models/hf-home
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    volumes:
      - ./data/rag_cache:/cache
      - ./logs:/logs
      - ./models:/models

  wrkhrs-asr:
    platform: linux/amd64
    environment:
      - HF_HOME=/models/hf-home
      - TRANSFORMERS_CACHE=/models/transformers
      - MODEL_CACHE_DIR=/models/hf-home
      - ASR_MODEL=${ASR_MODEL:-Systran/faster-whisper-small}
    volumes:
      - ./logs:/logs
      - ./models:/models

  wrkhrs-tool-registry:
    platform: linux/amd64
    volumes:
      - ./plugins:/plugins:rw
      - ./logs:/logs

  wrkhrs-mcp:
    platform: linux/amd64
    volumes:
      - ./data/mcp:/data:rw
      - ./logs:/logs

  structure-gateway:
    platform: linux/amd64
    volumes:
      - ./logs:/logs

  mlflow:
    ports: !reset
      - "5001:5000"

  # Services to exclude completely
  pihole:
    profiles:
      - disabled
  wireguard:
    profiles:
      - disabled
  homarr:
    profiles:
      - disabled
  node-exporter:
    profiles:
      - disabled
  vault:
    profiles:
      - disabled
