version: "3.9"

services:
  qwen-vllm:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              count: 1
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - HF_HOME=/.cache/models/hf
      - TRANSFORMERS_CACHE=/.cache/models/hf
      - MODEL_CACHE_DIR=/.cache/models/hf
    command:
      [
        "--model", "${MODEL_NAME:-Qwen/Qwen3.5-9B}",
        "--dtype", "${DTYPE:-bfloat16}",
        "--max-model-len", "${MAX_MODEL_LEN:-32768}",
        "--gpu-memory-utilization", "${GPU_MEMORY_UTILIZATION:-0.92}",
        "--enable-prefix-caching",
        "--host", "0.0.0.0",
        "--port", "8000"
      ]
    ports:
      - "${WORKER_VLLM_PORT:-8000}:8000"
    runtime: nvidia
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - vllm_cache:/root/.cache
      - ../../.cache/models/hf:/.cache/models/hf
      - ../../.cache/models/vllm:/.cache/models/vllm

volumes:
  vllm_cache:
