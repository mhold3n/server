# Run from repo root: docker compose --project-directory <repo> -f worker/vllm/docker-compose.vllm.yml up -d
# Cache: ${COMPOSE_DATA_ROOT:-.docker-data}/worker/vllm_cache

services:
  qwen-vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai@sha256:7a0f0fdd2771464b6976625c2b2d5dd46f566aa00fbc53eceab86ef50883da90}
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              count: 1
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - HF_HOME=/.cache/models/hf
      - TRANSFORMERS_CACHE=/.cache/models/hf
      - MODEL_CACHE_DIR=/.cache/models/hf
    command:
      [
        "--model", "${MODEL_NAME:-Qwen/Qwen3.5-9B}",
        "--dtype", "${DTYPE:-bfloat16}",
        "--max-model-len", "${MAX_MODEL_LEN:-32768}",
        "--gpu-memory-utilization", "${GPU_MEMORY_UTILIZATION:-0.92}",
        "--enable-prefix-caching",
        "--host", "0.0.0.0",
        "--port", "8000"
      ]
    ports:
      - "${WORKER_VLLM_PORT:-8000}:8000"
    runtime: nvidia
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ${COMPOSE_DATA_ROOT:-.docker-data}/worker/vllm_cache:/root/.cache
      - ./.cache/models/hf:/.cache/models/hf
      - ./.cache/models/vllm:/.cache/models/vllm
