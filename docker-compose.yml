# Persistent Compose data lives under COMPOSE_DATA_ROOT (default .docker-data/); see docs/dev-environment.md.
# AI service images: config/xlotyl-images.env (XLOTYL_IMAGE_PREFIX + XLOTYL_VERSION).
name: agent-orchestrator

services:
  # OpenAI-compatible stub for local dev; api /health calls models.list() against OPENAI_BASE_URL.
  mock-openai:
    build:
      context: ./services/mock-openai
    ports:
      - "${MOCK_OPENAI_PORT:-18002}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    image: ${XLOTYL_IMAGE_PREFIX}/api-service:${XLOTYL_VERSION}
    environment:
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://mock-openai:8000/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-local-dev-token}
      REDIS_URL: redis://queue:6379
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: ${DEBUG:-false}
      # Pydantic accepts either name (see Settings.agent_platform_url).
      AGENT_PLATFORM_URL: ${AGENT_PLATFORM_URL:-${ORCHESTRATOR_AGENT_PLATFORM_URL:-http://wrkhrs-agent-platform:8000}}
      ORCHESTRATOR_AGENT_PLATFORM_URL: ${ORCHESTRATOR_AGENT_PLATFORM_URL:-http://wrkhrs-agent-platform:8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      queue:
        condition: service_healthy
      mock-openai:
        condition: service_healthy
    command: ["uvicorn", "src.app:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  router:
    image: ${XLOTYL_IMAGE_PREFIX}/router-service:${XLOTYL_VERSION}
    environment:
      API_URL: http://api:8080
      REDIS_URL: redis://queue:6379
      MCP_SERVERS_CONFIG: /app/config/mcp_servers.yaml
    ports:
      - "${ROUTER_PORT:-8000}:8000"
    depends_on:
      - api
      - queue
    command: ["uvicorn", "src.router:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  queue:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./services/queue-service/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ${COMPOSE_DATA_ROOT:-.docker-data}/core/redis:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
