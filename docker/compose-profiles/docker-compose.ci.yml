name: agent-orchestrator-ci

# Minimal stack required for RUN_LIVE_STACK_TESTS=1 pytest suites.
# Build contexts and binds assume `docker compose --project-directory <repo root> -f ...`.
services:
  queue:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mock-openai:
    build:
      context: ./services/mock-openai
    ports:
      - "18002:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 2s

  api:
    image: ${XLOTYL_IMAGE_PREFIX}/api-service:${XLOTYL_VERSION}
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-test}
      - OPENAI_BASE_URL=http://mock-openai:8000/v1
      - REDIS_URL=redis://queue:6379
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    ports:
      - "${API_PORT:-8080}:8080"
    # Don't gate startup on "service_healthy" here. We already wait on
    # HTTP health endpoints from the host (in CI + run_ci_local.sh), and
    # some services (Tempo/MLflow) can legitimately take time to report
    # Docker health even after their HTTP endpoints are reachable.
    depends_on:
      - queue
      - mock-openai
      - mlflow
      - tempo
    command: ["uvicorn", "src.app:app", "--host", "0.0.0.0", "--port", "8080"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 30

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
      --default-artifact-root s3://mlflow/
      --serve-artifacts
    environment:
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

  tempo:
    image: grafana/tempo:2.4.1
    command: ["-config.file=/etc/tempo.yml"]
    ports:
      - "${TEMPO_PORT:-3200}:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./docker/config/observability/tempo/tempo.yml:/etc/tempo.yml:ro
    healthcheck:
      # grafana/tempo image ships wget, not curl
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3200/ready",
        ]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 15s

  mcp-registry:
    image: ${XLOTYL_IMAGE_PREFIX}/mcp-registry:${XLOTYL_VERSION}
    ports:
      - "${MCP_REGISTRY_PORT:-8001}:8000"
    environment:
      - MCP_CONFIG=/mcp/config/mcp_servers.yaml
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    # Same rationale as `api.depends_on` above: let the container start,
    # then let CI's explicit HTTP waits determine readiness.
    depends_on:
      - mlflow
      - tempo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
