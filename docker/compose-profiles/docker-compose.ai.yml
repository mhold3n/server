# WrkHrs AI Stack — images from ghcr.io/xlotyl/* (version in config/xlotyl-images.env).
# Source compose and Dockerfiles: https://github.com/XLOTYL/xlotyl

services:
  structure-gateway:
    image: ghcr.io/xlotyl/structure-service:${XLOTYL_VERSION}
    ports:
      - "${STRUCTURE_GATEWAY_PORT:-8090}:8000"
    environment:
      - WRKHRS_GATEWAY_URL=http://wrkhrs-gateway:8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      wrkhrs-gateway:
        condition: service_healthy
    volumes:
      - ${COMPOSE_DATA_ROOT:-.docker-data}/ai/logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  wrkhrs-gateway:
    image: ghcr.io/xlotyl/wrkhrs-gateway:${XLOTYL_VERSION}
    ports:
      - "${WRKHRS_GATEWAY_PORT:-8091}:8000"
    environment:
      - GATEWAY_PORT=8000
      - ORCHESTRATOR_URL=${ORCHESTRATOR_URL:-http://wrkhrs-agent-platform:8000}
      - RAG_URL=http://wrkhrs-rag:8000
      - ASR_URL=http://wrkhrs-asr:8000
      - LLM_RUNNER_URL=${LLM_RUNNER_URL:-http://llm-runner:8000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      wrkhrs-agent-platform:
        condition: service_healthy
    volumes:
      - ${COMPOSE_DATA_ROOT:-.docker-data}/ai/gateway_state:/state
      - ${COMPOSE_DATA_ROOT:-.docker-data}/ai/logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  wrkhrs-agent-platform:
    image: ghcr.io/xlotyl/agent-platform:${XLOTYL_VERSION}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${WRKHRS_AGENT_PLATFORM_PORT:-8087}:8000"
    environment:
      - AGENT_PLATFORM_PORT=8000
      - LLM_BACKEND=${LLM_BACKEND:-vllm}
      - LLM_RUNNER_URL=${LLM_RUNNER_URL:-http://model-runtime:8000}
      - VLLM_MODEL=${VLLM_MODEL:-Qwen/Qwen3-4B}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://model-runtime:8000/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-local-openai}
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGINGFACE_HUB_TOKEN=${HUGGINGFACE_HUB_TOKEN:-}
      - HF_INFERENCE_MODEL=${HF_INFERENCE_MODEL:-Qwen/Qwen3-8B}
      - HF_INFERENCE_BASE_URL=${HF_INFERENCE_BASE_URL:-https://router.huggingface.co/v1}
      - MODEL_RUNTIME_URL=${MODEL_RUNTIME_URL:-http://model-runtime:8000}
      - ORCHESTRATOR_API_URL=http://api:8080
      - TOOL_REGISTRY_URL=http://wrkhrs-tool-registry:8000
      - RAG_URL=http://wrkhrs-rag:8000
      - ASR_URL=http://wrkhrs-asr:8000
      - MCP_URL=http://wrkhrs-mcp:8000
      - CLAW_CODE_BINARY=${CLAW_CODE_BINARY:-claw}
      - CLAW_CODE_MODEL=${CLAW_CODE_MODEL:-}
      - OMA_DEFAULT_MODEL=${OMA_DEFAULT_MODEL:-gpt-4o-mini}
      - OMA_DEFAULT_PROVIDER=${OMA_DEFAULT_PROVIDER:-openai}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      wrkhrs-tool-registry:
        condition: service_healthy
      wrkhrs-rag:
        condition: service_healthy
      wrkhrs-asr:
        condition: service_healthy
      wrkhrs-mcp:
        condition: service_healthy
      model-runtime:
        condition: service_healthy
    volumes:
      - ${COMPOSE_DATA_ROOT:-.docker-data}/ai/logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 25s

  wrkhrs-orchestrator:
    profiles:
      - legacy-python-orchestrator
    image: ghcr.io/xlotyl/wrkhrs-orchestrator:${XLOTYL_VERSION}
    ports:
      - "${WRKHRS_ORCH_PORT:-8081}:8000"
    environment:
      - ORCHESTRATOR_PORT=8000
      - TOOL_REGISTRY_URL=http://wrkhrs-tool-registry:8000
      - RAG_URL=http://wrkhrs-rag:8000
      - ASR_URL=http://wrkhrs-asr:8000
      - MCP_URL=http://wrkhrs-mcp:8000
      - LLM_RUNNER_URL=${LLM_RUNNER_URL:-http://llm-runner:8000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      wrkhrs-tool-registry:
        condition: service_healthy
      wrkhrs-rag:
        condition: service_healthy
      wrkhrs-asr:
        condition: service_healthy
      wrkhrs-mcp:
        condition: service_healthy
    volumes:
      - ${COMPOSE_DATA_ROOT:-.docker-data}/ai/logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  wrkhrs-rag:
    image: ghcr.io/xlotyl/wrkhrs-rag:${XLOTYL_VERSION}
    ports:
      - "${WRKHRS_RAG_PORT:-8082}:8000"
    environment:
      - RAG_PORT=8000
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - EMBEDDING_BACKEND=${EMBEDDING_BACKEND:-auto}
      - EMBEDDING_ENDPOINT_URL=${EMBEDDING_ENDPOINT_URL:-}
      - RERANKER_URL=${RERANKER_URL:-}
      - RAG_CHUNK_SIZE=${RAG_CHUNK_SIZE:-500}
      - RAG_CHUNK_OVERLAP=${RAG_CHUNK_OVERLAP:-50}
      - RAG_MAX_RESULTS=${RAG_MAX_RESULTS:-10}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ${COMPOSE_DATA_ROOT:-.docker-data}/ai/rag_cache:/cache
      - ${COMPOSE_DATA_ROOT:-.docker-data}/ai/logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 300s

  wrkhrs-asr:
    image: ghcr.io/xlotyl/wrkhrs-asr:${XLOTYL_VERSION}
    ports:
      - "${WRKHRS_ASR_PORT:-8084}:8000"
    environment:
      - ASR_PORT=8000
      - ASR_MODEL=${ASR_MODEL:-medium}
      - ASR_DEVICE=${ASR_DEVICE:-cpu}
      - ASR_LANGUAGE=${ASR_LANGUAGE:-auto}
      - ASR_EXTRACT_TECHNICAL=${ASR_EXTRACT_TECHNICAL:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ${COMPOSE_DATA_ROOT:-.docker-data}/ai/logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s

  model-runtime:
    image: ghcr.io/xlotyl/model-runtime:${XLOTYL_VERSION}
    ports:
      - "${MODEL_RUNTIME_PORT:-8765}:8000"
    environment:
      - MODEL_RUNTIME_HOST=0.0.0.0
      - MODEL_RUNTIME_PORT=8000
      - MODEL_RUNTIME_CONFIG_PATH=/app/services/model-runtime/config/models.yaml
      - MODEL_RUNTIME_GENERAL_MAX_NEW_TOKENS=${MODEL_RUNTIME_GENERAL_MAX_NEW_TOKENS:-64}
      - MODEL_RUNTIME_TORCH_DTYPE=${MODEL_RUNTIME_TORCH_DTYPE:-float32}
      - TORCH_DISABLE_MKLDNN=1
      - MOCK_INFER=${MOCK_INFER:-0}
      - HF_HOME=/.cache/models/hf
      - TRANSFORMERS_CACHE=/.cache/models/hf
      - MODEL_CACHE_DIR=/.cache/models/hf
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGINGFACE_HUB_TOKEN=${HUGGINGFACE_HUB_TOKEN:-}
    volumes:
      - ./.cache/models/hf:/.cache/models/hf
      - ${COMPOSE_DATA_ROOT:-.docker-data}/ai/logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  wrkhrs-tool-registry:
    image: ghcr.io/xlotyl/wrkhrs-tool-registry:${XLOTYL_VERSION}
    ports:
      - "${WRKHRS_TOOLS_PORT:-8086}:8000"
    environment:
      - TOOLS_PORT=8000
      - PLUGINS_AUTO_REFRESH=${PLUGINS_AUTO_REFRESH:-true}
      - PLUGINS_SCAN_INTERVAL=${PLUGINS_SCAN_INTERVAL:-300}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ${COMPOSE_DATA_ROOT:-.docker-data}/ai/plugins:/plugins:rw
      - ${COMPOSE_DATA_ROOT:-.docker-data}/ai/logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

  wrkhrs-mcp:
    image: ghcr.io/xlotyl/wrkhrs-mcp:${XLOTYL_VERSION}
    ports:
      - "${WRKHRS_MCP_PORT:-8085}:8000"
    environment:
      - MCP_PORT=8000
      - CHEMISTRY_LIBS_ENABLED=${CHEMISTRY_LIBS_ENABLED:-false}
      - MATERIALS_DB_SOURCE=${MATERIALS_DB_SOURCE:-internal}
      - MECHANICAL_PRECISION=${MECHANICAL_PRECISION:-6}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ${COMPOSE_DATA_ROOT:-.docker-data}/ai/mcp_data:/data:rw
      - ${COMPOSE_DATA_ROOT:-.docker-data}/ai/logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

  mcp-registry:
    image: ghcr.io/xlotyl/mcp-registry:${XLOTYL_VERSION}
    ports:
      - "${MCP_REGISTRY_PORT:-8001}:8000"
    environment:
      - MCP_CONFIG=/mcp/config/mcp_servers.yaml
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
      - tempo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
