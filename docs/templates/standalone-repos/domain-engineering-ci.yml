# mhold3n/domain-engineering — copy to .github/workflows/ci.yml
# Set SERVER_REF to a commit SHA or tag on mhold3n/server.
# Heavy tests: raise job-timeout-minutes (default 360 in reusable workflow) or narrow pytest-args.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  package-ci:
    uses: mhold3n/server/.github/workflows/reusable-python-package-ci.yml@SERVER_REF
    secrets: inherit
    with:
      python-version: "3.11"
      extras-name: dev
      mypy-target: src
      ruff-paths: .
      pytest-args: pytest -q
      job-timeout-minutes: 480
