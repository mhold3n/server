# Optional: mhold3n/ai-shared-service — build and push to GHCR (separate from package CI).
# Prerequisites in that repo:
#   - Dockerfile at repo root (example below mirrors server’s runtime: editable install + uvicorn).
#   - Repo Actions: Settings → Actions → General → Workflow permissions → read and write packages.
#
# Image: ghcr.io/mhold3n/ai-shared-service:<semver-tag>
#
# Example Dockerfile at ai-shared-service repo root (adjust paths if your layout differs):
#
#   FROM python:3.11-slim
#   ENV PYTHONDONTWRITEBYTECODE=1 PYTHONUNBUFFERED=1 PIP_NO_CACHE_DIR=1
#   RUN apt-get update && apt-get install -y --no-install-recommends build-essential \
#       && rm -rf /var/lib/apt/lists/*
#   WORKDIR /app
#   COPY . .
#   RUN python -m pip install --upgrade pip && pip install --no-cache-dir -e .
#   EXPOSE 8090
#   CMD ["uvicorn", "src.app:app", "--host", "0.0.0.0", "--port", "8090"]

name: Publish GHCR

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/ai-shared-service
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
